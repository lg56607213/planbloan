services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: planbloan
      MYSQL_USER: planbloan
      MYSQL_PASSWORD: ${DB_PASSWORD:-planbloan}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_URL: jdbc:mysql://db:3306/planbloan?useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: planbloan
      DB_PASSWORD: ${DB_PASSWORD:-planbloan}
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-min-32-chars}
      FILE_STORAGE_PROVIDER: ${FILE_STORAGE_PROVIDER:-local}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8081}
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8081:80"

volumes:
  db-data:
  uploads:
