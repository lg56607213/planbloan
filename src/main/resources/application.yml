spring:
  application:
    name: planbloan
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 40MB
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/planbloan;MODE=MySQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: PlanB Loan Brokerage API
    version: v1

jwt:
  secret: ${JWT_SECRET:planb-loan-secret-key-must-be-at-least-32-characters-long}
  expiration: ${JWT_EXPIRATION:86400000}

file-storage:
  provider: ${FILE_STORAGE_PROVIDER:local}
  local:
    base-path: ${FILE_STORAGE_LOCAL_PATH:./uploads}
  s3:
    bucket: ${FILE_STORAGE_S3_BUCKET:}
    region: ${FILE_STORAGE_S3_REGION:ap-northeast-2}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
